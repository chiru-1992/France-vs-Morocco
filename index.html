<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>France vs Morocco | Quarter Final | FIFA World Cup 2026</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ================= HEADER ================= -->

    <header class="header">

        <h1>🇫🇷 FRANCE VS MOROCCO 🇲🇦</h1>

        <h2>Quarter Final • FIFA World Cup 2026</h2>

        <div class="match-info">

            <div class="info-box">
                📅 <strong>Date:</strong> 10 July
            </div>

            <div class="info-box">
                🕜 <strong>Time:</strong> 1:30 AM
            </div>

        </div>

    </header>


    <!-- ================= SECRET CODE ================= -->

    <section class="unlock-section">

        <h3>🔐 Unlock Your Tickets</h3>

        <p class="unlock-text">
            Enter the secret code to reveal all players.
        </p>

        <div class="unlock-box">

            <input
                type="password"
                id="secretCode"
                placeholder="Enter Secret Code">

            <button id="unlockBtn">
                UNLOCK
            </button>

        </div>

        <p id="message"></p>

    </section>


    <!-- ================= TICKETS ================= -->

    <main>

        <div id="ticketContainer" class="ticket-container">

            <!-- Ticket 1 -->
            <div class="ticket" data-ticket="1"></div>

            <!-- Ticket 2 -->
            <div class="ticket" data-ticket="2"></div>

            <!-- Ticket 3 -->
            <div class="ticket" data-ticket="3"></div>

            <!-- Ticket 4 -->
            <div class="ticket" data-ticket="4"></div>

            <!-- Ticket 5 -->
            <div class="ticket" data-ticket="5"></div>

            <!-- Ticket 6 -->
            <div class="ticket" data-ticket="6"></div>

            <!-- Ticket 7 -->
            <div class="ticket" data-ticket="7"></div>

            <!-- Ticket 8 -->
            <div class="ticket" data-ticket="8"></div>

            <!-- Ticket 9 -->
            <div class="ticket" data-ticket="9"></div>

            <!-- Ticket 10 -->
            <div class="ticket" data-ticket="10"></div>

            <!-- Ticket 11 -->
            <div class="ticket" data-ticket="11"></div>

            <!-- Ticket 12 -->
            <div class="ticket" data-ticket="12"></div>

            <!-- Ticket 13 -->
            <div class="ticket" data-ticket="13"></div>

            <!-- Ticket 14 -->
            <div class="ticket" data-ticket="14"></div>

            <!-- Ticket 15 -->
            <div class="ticket" data-ticket="15"></div>

            <!-- Ticket 16 -->
            <div class="ticket" data-ticket="16"></div>

            <!-- Ticket 17 -->
            <div class="ticket" data-ticket="17"></div>

            <!-- Ticket 18 -->
            <div class="ticket" data-ticket="18"></div>

            <!-- Ticket 19 -->
            <div class="ticket" data-ticket="19"></div>

            <!-- Ticket 20 -->
            <div class="ticket" data-ticket="20"></div>

            <!-- Ticket 21 -->
            <div class="ticket" data-ticket="21"></div>

            <!-- Ticket 22 -->
            <div class="ticket" data-ticket="22"></div>

            <!-- Ticket 23 -->
            <div class="ticket" data-ticket="23"></div>

        </div>

    </main>


    <!-- ================= FOOTER ================= -->

    <footer>

        <h3>CREATOR</h3>

        <p>CHIRANJEEVI GURUNG</p>

    </footer>


    <script src="script.js"></script>

</body>
</html>
